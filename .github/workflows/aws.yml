# This workflow will build and push a new container image to Amazon ECR,   
# and then will deploy a new task definition to Amazon ECS, when there is a push to the "main" branch. 
#
# To use this workflow, you will need to complete the following set-up steps:
#
# 1. Create an ECR repository to store your images.
#    For example: `aws ecr create-repository --repository-name my-ecr-repo --region us-east-2`. 
#    Replace the value of the `ECR_REPOSITORY` environment variable in the workflow below with your repository's name.
#    Replace the value of the `AWS_REGION` environment variable in the workflow below with your repository's region.
#
# 2. Create an ECS task definition, an ECS cluster, and an ECS service.
#    For example, follow the Getting Started guide on the ECS console:
#      https://us-east-2.console.aws.amazon.com/ecs/home?region=us-east-2#/firstRun
#    Replace the value of the `ECS_SERVICE` environment variable in the workflow below with the name you set for the Amazon ECS service.
#    Replace the value of the `ECS_CLUSTER` environment variable in the workflow below with the name you set for the cluster.
#
# 3. Store your ECS task definition as a JSON file in your repository.
#    The format should follow the output of `aws ecs register-task-definition --generate-cli-skeleton`.
#    Replace the value of the `ECS_TASK_DEFINITION` environment variable in the workflow below with the path to the JSON file.
#    Replace the value of the `CONTAINER_NAME` environment variable in the workflow below with the name of the container
#    in the `containerDefinitions` section of the task definition.
#
# 4. Store an IAM user access key in GitHub Actions secrets named `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY`.
#    See the documentation for each action used below for the recommended IAM policies for this IAM user,
#    and best practices on handling the access key credentials.   

name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prop3
  ECS_SERVICE: prop3-ef40
  ECS_CLUSTER: default
  ECS_TASK_DEFINITION: .aws/prop-cluster7.json
  CONTAINER_NAME: Main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build a docker container and
        # push it to ECR so that it can
        # be deployed to ECS.
        docker build -f Reparo.Host/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
    - name: Inject app configuration into ECS task definition
      run: |
        jq '
          .containerDefinitions |= map(
            if .name == "Main" then
              .environment = [
                { "name": "AppBasePath", "value": "/" },
                { "name": "DetailedErrors", "value": "false" },
                { "name": "UserEnvironment__OidcClientOptions__Authority", "value": "${{ secrets.USERENVIRONMENT__OIDCCLIENTOPTIONS__AUTHORITY }}" },
                { "name": "UserEnvironment__OidcClientOptions__Client_Id", "value": "Qnxt.Member.Client" },
                { "name": "UserEnvironment__OidcClientOptions__Scope", "value": "openid profile roles qnxt-member-api" },
                { "name": "UserEnvironment__Google__Client_Id", "value": "${{ secrets.USERENVIRONMENT__GOOGLE__CLIENT_ID }}" },
                { "name": "UserEnvironment__Google__ClientSecret", "value": "${{ secrets.USERENVIRONMENT__GOOGLE__CLIENTSECRET }}" },
                { "name": "UserEnvironment__Facebook__AppId", "value": "${{ secrets.USERENVIRONMENT__FACEBOOK__APPID }}" },
                { "name": "UserEnvironment__Facebook__AppSecret", "value": "${{ secrets.USERENVIRONMENT__FACEBOOK__APPSECRET }}" },
                { "name": "UserEnvironment__Twitter__ConsumerAPIKey", "value": "${{ secrets.USERENVIRONMENT__TWITTER__CONSUMERAPIKEY }}" },
                { "name": "UserEnvironment__Twitter__ConsumerSecret", "value": "${{ secrets.USERENVIRONMENT__TWITTER__CONSUMERSECRET }}" },
                { "name": "UserEnvironment__EnvId", "value": "${{ secrets.USERENVIRONMENT__ENVID }}" },
                { "name": "UserEnvironment__PartnerBlock", "value": "${{ secrets.USERENVIRONMENT__PARTNERBLOCK }}" },
                { "name": "Syncfusion__LicenseKey", "value": "${{ secrets.SYNCFUSION__LICENSEKEY }}" },
                { "name": "GoogleMaps__ApiKey", "value": "${{ secrets.GOOGLEMAPS__APIKEY }}" },
                { "name": "ConnectionStrings__DefaultConnection", "value": "${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}" },
                { "name": "AI__openAIApiKey", "value": "${{ secrets.AI__OPENAIAPIKEY }}" },
                { "name": "AI__openAIModel", "value": "gpt-3.5-turbo" },
                { "name": "Endpoints__Api__ClaimUri", "value": "https://qn-azodv-340.tzhealthcare.com/QNXTApi/Claim/" },
                { "name": "AWS__BucketName", "value": "reparo-669308277857-us-east-1-an" },
                { "name": "AWS__Region", "value": "us-east-1" }
              ] |
              .secrets = []
            else
              .
            end
          )' "${{ env.ECS_TASK_DEFINITION }}" > task-definition.json
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
